<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo de la ventana -->
  <rect width="400" height="500" fill="#f5e6f0" rx="15"/>
  
  <!-- Header de la ventana -->
  <rect width="400" height="40" fill="#e6d0e6" rx="15"/>
  <rect y="40" width="400" height="15" fill="#e6d0e6"/>
  
  <!-- Botones de ventana -->
  <circle cx="15" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="35" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="55" cy="20" r="6" fill="#28ca42"/>
  
  <!-- Título -->
  <text x="200" y="27" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7b4b94" text-anchor="middle">Calculadora Profesional</text>
  
  <!-- Botones superiores -->
  <rect x="20" y="60" width="175" height="35" rx="8" fill="#d4a5d4"/>
  <text x="107.5" y="82" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">☰ Modo Científico</text>
  
  <rect x="205" y="60" width="175" height="35" rx="8" fill="#f4a6d7"/>
  <text x="292.5" y="82" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">🎮 Juego de Divisiones</text>
  
  <!-- Display -->
  <rect x="20" y="110" width="360" height="80" rx="8" fill="#f5e6f0"/>
  <text x="370" y="135" font-family="Arial, sans-serif" font-size="14" fill="#9b7ba8" text-anchor="end">45 + 78</text>
  <text x="370" y="175" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#7b4b94" text-anchor="end">123</text>
  
  <!-- Botones de la calculadora -->
  <!-- Fila 1 -->
  <rect x="20" y="210" width="80" height="50" rx="8" fill="#d4a5d4"/>
  <text x="60" y="242" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">C</text>
  
  <rect x="110" y="210" width="80" height="50" rx="8" fill="#d4a5d4"/>
  <text x="150" y="242" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">⌫</text>
  
  <rect x="200" y="210" width="80" height="50" rx="8" fill="#d4a5d4"/>
  <text x="240" y="242" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">%</text>
  
  <rect x="290" y="210" width="90" height="50" rx="8" fill="#f4a6d7"/>
  <text x="335" y="242" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">/</text>
  
  <!-- Fila 2 -->
  <rect x="20" y="270" width="80" height="50" rx="8" fill="#e6d0e6"/>
  <text x="60" y="302" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">7</text>
  
  <rect x="110" y="270" width="80" height="50" rx="8" fill="#e6d0e6"/>
  <text x="150" y="302" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">8</text>
  
  <rect x="200" y="270" width="80" height="50" rx="8" fill="#e6d0e6"/>
  <text x="240" y="302" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">9</text>
  
  <rect x="290" y="270" width="90" height="50" rx="8" fill="#f4a6d7"/>
  <text x="335" y="302" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">×</text>
  
  <!-- Fila 3 -->
  <rect x="20" y="330" width="80" height="50" rx="8" fill="#e6d0e6"/>
  <text x="60" y="362" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
  
  <rect x="110" y="330" width="80" height="50" rx="8" fill="#e6d0e6"/>
  <text x="150" y="362" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text>
  
  <rect x="200" y="330" width="80" height="50" rx="8" fill="#e6d0e6"/>
  <text x="240" y="362" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">6</text>
  
  <rect x="290" y="330" width="90" height="50" rx="8" fill="#f4a6d7"/>
  <text x="335" y="362" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">-</text>
  
  <!-- Fila 4 -->
  <rect x="20" y="390" width="80" height="50" rx="8" fill="#e6d0e6"/>
  <text x="60" y="422" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
  
  <rect x="110" y="390" width="80" height="50" rx="8" fill="#e6d0e6"/>
  <text x="150" y="422" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
  
  <rect x="200" y="390" width="80" height="50" rx="8" fill="#e6d0e6"/>
  <text x="240" y="422" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
  
  <rect x="290" y="390" width="90" height="50" rx="8" fill="#f4a6d7"/>
  <text x="335" y="422" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">+</text>
  
  <!-- Fila 5 -->
  <rect x="20" y="450" width="80" height="40" rx="8" fill="#d4a5d4"/>
  <text x="60" y="477" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">±</text>
  
  <rect x="110" y="450" width="80" height="40" rx="8" fill="#e6d0e6"/>
  <text x="150" y="477" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">0</text>
  
  <rect x="200" y="450" width="80" height="40" rx="8" fill="#e6d0e6"/>
  <text x="240" y="477" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">.</text>
  
  <rect x="290" y="450" width="90" height="40" rx="8" fill="#f4a6d7"/>
  <text x="335" y="477" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">=</text>
  
  <!-- Sombra -->
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
</svg>
