<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6f0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e6d0e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a5d4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="displayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e6f0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect width="256" height="256" rx="60" fill="url(#bgGradient)"/>
  
  <!-- Calculadora -->
  <g transform="translate(38, 28)" filter="url(#shadow)">
    <!-- Cuerpo de la calculadora -->
    <rect width="180" height="200" rx="20" fill="#ffffff" opacity="0.95"/>
    
    <!-- Display -->
    <rect x="15" y="15" width="150" height="50" rx="8" fill="url(#displayGradient)"/>
    <text x="155" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#7b4b94" text-anchor="end">123</text>
    
    <!-- Botones - Fila 1 -->
    <rect x="15" y="75" width="35" height="25" rx="6" fill="#d4a5d4"/>
    <text x="32.5" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">C</text>
    
    <rect x="55" y="75" width="35" height="25" rx="6" fill="#d4a5d4"/>
    <text x="72.5" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">÷</text>
    
    <rect x="95" y="75" width="35" height="25" rx="6" fill="#f4a6d7"/>
    <text x="112.5" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">×</text>
    
    <rect x="135" y="75" width="30" height="25" rx="6" fill="#f4a6d7"/>
    <text x="150" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">-</text>
    
    <!-- Botones - Fila 2 -->
    <rect x="15" y="105" width="35" height="25" rx="6" fill="#e6d0e6"/>
    <text x="32.5" y="122" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">7</text>
    
    <rect x="55" y="105" width="35" height="25" rx="6" fill="#e6d0e6"/>
    <text x="72.5" y="122" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">8</text>
    
    <rect x="95" y="105" width="35" height="25" rx="6" fill="#e6d0e6"/>
    <text x="112.5" y="122" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">9</text>
    
    <rect x="135" y="105" width="30" height="55" rx="6" fill="#f4a6d7"/>
    <text x="150" y="137" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">+</text>
    
    <!-- Botones - Fila 3 -->
    <rect x="15" y="135" width="35" height="25" rx="6" fill="#e6d0e6"/>
    <text x="32.5" y="152" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
    
    <rect x="55" y="135" width="35" height="25" rx="6" fill="#e6d0e6"/>
    <text x="72.5" y="152" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text>
    
    <rect x="95" y="135" width="35" height="25" rx="6" fill="#e6d0e6"/>
    <text x="112.5" y="152" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">6</text>
    
    <!-- Botones - Fila 4 -->
    <rect x="15" y="165" width="35" height="25" rx="6" fill="#e6d0e6"/>
    <text x="32.5" y="182" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    
    <rect x="55" y="165" width="35" height="25" rx="6" fill="#e6d0e6"/>
    <text x="72.5" y="182" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    
    <rect x="95" y="165" width="35" height="25" rx="6" fill="#e6d0e6"/>
    <text x="112.5" y="182" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    
    <rect x="135" y="165" width="30" height="25" rx="6" fill="#f06292"/>
    <text x="150" y="182" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">=</text>
  </g>
  
  <!-- Brillo/Highlight -->
  <ellipse cx="80" cy="60" rx="40" ry="30" fill="#ffffff" opacity="0.15"/>
</svg>
